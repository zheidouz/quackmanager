# QuackManager Security — CodeQL analysis and dependency review
# Scans every PR and push to main for vulnerabilities
---
name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # Every Monday at 6:00 UTC

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: github/codeql-action/init@0573bb5e31c0b69c35e5e0b1f3b746dd753ce25d # v3.28.7
        with:
          languages: javascript-typescript
          queries: security-extended,security-and-quality
      - uses: github/codeql-action/autobuild@0573bb5e31c0b69c35e5e0b1f3b746dd753ce25d # v3.28.7
      - uses: github/codeql-action/analyze@0573bb5e31c0b69c35e5e0b1f3b746dd753ce25d # v3.28.7

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/dependency-review-action@8815b0e342aae3da200fc3774c08bc6d4e0ba4a7 # v4.6.0
        with:
          fail-on-severity: high
