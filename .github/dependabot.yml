# QuackManager Dependabot — Automated dependency updates
# Keeps npm packages and GitHub Actions up to date
---
version: 2
updates:
  # npm dependencies
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: UTC
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - automerge
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: UTC
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: chore
      include: scope
